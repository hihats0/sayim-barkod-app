name: Sync A101 Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "25 2 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/sync_a101_catalog.py"
      - "scripts/sync_a101_catalog_fast.py"
      - "scripts/sync_a101_catalog_quick.py"
      - ".github/workflows/sync-a101.yml"

permissions:
  contents: write

concurrency:
  group: a101-catalog-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scraper dependencies
        run: pip install requests beautifulsoup4

      - name: Check scraper syntax
        run: python -m py_compile scripts/sync_a101_catalog.py scripts/sync_a101_catalog_fast.py scripts/sync_a101_catalog_quick.py

      - name: Build A101 catalog
        id: build
        continue-on-error: true
        timeout-minutes: 7
        env:
          PARSE_API_KEY: ${{ secrets.PARSE_API_KEY }}
          A101_REQUEST_DELAY: "0.50"
          A101_HTTP_TIMEOUT: "12"
          A101_WAW_DELAY: "0.30"
          A101_WAW_MAX_PAGES: "12"
          A101_WAW_QUERIES: "a,e,i,ı,o,ö,u,ü"
        run: |
          set -o pipefail
          python scripts/sync_a101_catalog_quick.py 2>&1 | tee data/a101-sync.log

      - name: Write sync status
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          catalog_path = Path("data/a101-products.json")
          log_path = Path("data/a101-sync.log")
          try:
              catalog = json.loads(catalog_path.read_text(encoding="utf-8"))
          except Exception:
              catalog = {"metadata": {}, "products": []}
          products = catalog.get("products") if isinstance(catalog.get("products"), list) else []
          status = {
              "checkedAt": datetime.now(timezone.utc).isoformat(),
              "workflowOutcome": os.environ.get("BUILD_OUTCOME", "unknown"),
              "productCount": len(products),
              "barcodeCount": sum(bool(item.get("barcode")) for item in products if isinstance(item, dict)),
              "skuCount": sum(bool(item.get("sku")) for item in products if isinstance(item, dict)),
              "catalogStatus": catalog.get("metadata", {}).get("status"),
              "catalogMessage": catalog.get("metadata", {}).get("message"),
              "logTail": log_path.read_text(encoding="utf-8", errors="replace").splitlines()[-40:] if log_path.exists() else [],
          }
          Path("data/a101-sync-status.json").write_text(
              json.dumps(status, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(status, ensure_ascii=False, indent=2))
          PY

      - name: Validate generated JSON
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/a101-products.json").read_text(encoding="utf-8"))
          assert isinstance(data.get("products"), list)
          assert isinstance(data.get("metadata"), dict)
          print(f"product_count={len(data['products'])}")
          PY

      - name: Commit catalog and diagnostics
        if: always()
        run: |
          rm -f data/a101-sync.log
          if git diff --quiet -- data/a101-products.json data/a101-sync-status.json; then
            echo "Catalog and diagnostics unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/a101-products.json data/a101-sync-status.json
          git commit -m "A101 kataloğunu güncelle"
          git pull --rebase origin main
          git push origin HEAD:main
