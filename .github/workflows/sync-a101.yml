name: Sync A101 Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "25 2 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/sync_a101_catalog.py"
      - "scripts/sync_a101_catalog_fast.py"
      - ".github/workflows/sync-a101.yml"

permissions:
  contents: write

concurrency:
  group: a101-catalog-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scraper dependencies
        run: pip install requests beautifulsoup4

      - name: Check scraper syntax
        run: python -m py_compile scripts/sync_a101_catalog.py scripts/sync_a101_catalog_fast.py

      - name: Build A101 catalog
        env:
          PARSE_API_KEY: ${{ secrets.PARSE_API_KEY }}
          A101_REQUEST_DELAY: "0.55"
          A101_MAX_PRODUCTS: "15000"
          A101_MAX_LISTING_PAGES: "180"
          A101_WAW_DELAY: "0.40"
          A101_WAW_MAX_PAGES: "60"
        run: python scripts/sync_a101_catalog_fast.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("data/a101-products.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          products = data.get("products")
          assert isinstance(products, list)
          assert isinstance(data.get("metadata"), dict)
          print(json.dumps(data.get("metadata", {}), ensure_ascii=False, indent=2))
          print(f"product_count={len(products)}")
          PY

      - name: Commit refreshed catalog
        run: |
          if git diff --quiet -- data/a101-products.json; then
            echo "Catalog unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/a101-products.json
          git commit -m "A101 kataloğunu güncelle"
          git pull --rebase origin main
          git push origin HEAD:main
