name: A101 CORS Check

on:
  push:
    branches: [main]
    paths:
      - "a101-cors-trigger.txt"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Parse API browser preflight
        run: |
          mkdir -p data
          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "preflight:"
            curl -sS -i -X OPTIONS \
              -H 'Origin: https://hihats0.github.io' \
              -H 'Access-Control-Request-Method: GET' \
              -H 'Access-Control-Request-Headers: x-api-key' \
              'https://api.parse.bot/scraper/01e0d684-e029-4758-9eb5-c6214e407387/search_kapida_products?page=1&limit=10&query=fairy'
            echo
            echo "no_key_get:"
            curl -sS -i \
              -H 'Origin: https://hihats0.github.io' \
              -H 'Accept: application/json' \
              'https://api.parse.bot/scraper/01e0d684-e029-4758-9eb5-c6214e407387/search_kapida_products?page=1&limit=10&query=fairy' | head -80
          } > data/a101-cors-check.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/a101-cors-check.txt
          git commit -m "Parse raf API CORS sonucunu yaz" || exit 0
          git push origin HEAD:main
