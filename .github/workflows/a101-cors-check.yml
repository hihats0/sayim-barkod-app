name: A101 CORS Check

on:
  push:
    branches: [main]
    paths:
      - "a101-cors-trigger.txt"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check on-demand shelf product sources
        run: |
          mkdir -p data
          python - <<'PY'
          import json
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          barcode = '8006540335925'
          urls = {
              'openproductsfacts': f'https://world.openproductsfacts.org/api/v2/product/{barcode}.json',
              'openfoodfacts': f'https://world.openfoodfacts.org/api/v2/product/{barcode}.json',
              'upcitemdb': f'https://api.upcitemdb.com/prod/trial/lookup?upc={barcode}',
              'a101_jina_name_search': 'https://r.jina.ai/http://www.a101.com.tr/kapida/search?query=' + urllib.parse.quote('Fairy Sıvı Bulaşık Deterjanı 2600 ml'),
          }

          result = {
              'checkedAt': datetime.now(timezone.utc).isoformat(),
              'barcode': barcode,
              'sources': {},
          }

          for name, url in urls.items():
              request = urllib.request.Request(
                  url,
                  headers={
                      'User-Agent': 'SayimBarkod/1.0 (+https://github.com/hihats0/sayim-barkod-app)',
                      'Origin': 'https://hihats0.github.io',
                      'Accept': 'application/json,text/plain,*/*',
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=25) as response:
                      body = response.read(200000).decode('utf-8', errors='replace')
                      result['sources'][name] = {
                          'status': response.status,
                          'allowOrigin': response.headers.get('access-control-allow-origin', ''),
                          'contentType': response.headers.get('content-type', ''),
                          'containsBarcode': barcode in body,
                          'containsFairy': 'fairy' in body.lower(),
                          'containsA101ProductUrl': 'a101.com.tr/kapida/' in body,
                          'prefix': body[:1200],
                      }
              except Exception as exc:
                  result['sources'][name] = {'error': f'{type(exc).__name__}: {exc}'}

          with open('data/a101-cors-check.txt', 'w', encoding='utf-8') as handle:
              json.dump(result, handle, ensure_ascii=False, indent=2)
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/a101-cors-check.txt
          git commit -m "Raf ürünü kaynak test sonucunu yaz" || exit 0
          git push origin HEAD:main
